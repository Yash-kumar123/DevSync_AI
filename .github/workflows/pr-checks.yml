name: PR — Code Review Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  # ---------------------------------------------------------------------------
  # Enforce Conventional Commit format on the PR title
  # (used as the squash-merge commit message)
  # ---------------------------------------------------------------------------
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            wip
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: "PR title subject must start with a lowercase letter."

  # ---------------------------------------------------------------------------
  # Auto-label PRs by changed paths
  # ---------------------------------------------------------------------------
  labeler:
    name: Auto-Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
