name: devsync-ai

services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: npm run dev --workspace @devsync/web -- --host 0.0.0.0
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      VITE_GATEWAY_HTTP_URL: http://localhost:${GATEWAY_PORT:-4000}
      VITE_GATEWAY_WS_URL: ws://localhost:${GATEWAY_PORT:-4000}
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - devsync_dev
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    command: npm run dev --workspace @devsync/gateway
    ports:
      - '${GATEWAY_PORT:-4000}:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      CORS_ORIGIN: http://localhost:${WEB_PORT:-3000}
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:5000
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - .:/workspace
      - gateway_node_modules:/workspace/node_modules
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - devsync_dev
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:4000/api/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload
    ports:
      - '${AI_SERVICE_PORT:-5000}:5000'
    environment:
      ENVIRONMENT: development
      PORT: 5000
      CORS_ORIGINS: http://localhost:${WEB_PORT:-3000}
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CHROMA_PERSIST_DIRECTORY: /app/.chroma
    volumes:
      - ./apps/ai-service:/app
      - ai_chroma:/app/.chroma
    networks:
      - devsync_dev
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5000/api/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - devsync_dev
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  gateway_node_modules:
  ai_chroma:
  redis_data:

networks:
  devsync_dev:
    driver: bridge
