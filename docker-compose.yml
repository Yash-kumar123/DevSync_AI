# =============================================================================
# DevSync AI — Docker Compose
# Full local development stack
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Named volumes — persistent data that survives container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ---------------------------------------------------------------------------
# Custom bridge network — all containers share the same DNS namespace
# ---------------------------------------------------------------------------
networks:
  devsync_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # PostgreSQL — primary relational database
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: devsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devsync_secret}
      POSTGRES_DB: ${POSTGRES_DB:-devsync_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - devsync_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis — session cache, pub/sub, rate-limiting
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: devsync_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --save 60 1
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - devsync_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (assets, file snapshots)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: devsync_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - devsync_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -------------------------------------------------------------------------
  # Traefik — reverse proxy / API gateway (dev mode)
  # -------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: devsync_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - devsync_net
