<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>DevSync AI — Real-time Collaborative IDE</title>
    <meta name="title" content="DevSync AI — Real-time Collaborative IDE" />
    <meta
      name="description"
      content="DevSync AI is an open-source real-time collaborative IDE with built-in AI assistance. Code together, ship faster."
    />

    <!-- Favicon & Mobile Brand Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/devsync-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Mobile App Settings -->
    <meta name="theme-color" content="#0b0f19" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DevSync AI" />

    <!-- Google Fonts — Inter (UI) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DevSync AI — Real-time Collaborative IDE" />
    <meta
      property="og:description"
      content="Open-source real-time collaborative IDE with built-in AI assistance."
    />
    <meta property="og:image" content="/devsync-logo.png" />
